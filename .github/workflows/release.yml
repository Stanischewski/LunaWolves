name: Build Release ZIP

# Läuft wenn ein Tag im Format "v*" (z.B. v1.0.7) gepusht wird.
# Erstellt ein ZIP mit der Addon-Struktur und hängt es an den passenden Release.
# Falls der Release noch nicht existiert, wird er automatisch erstellt.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version aus Tag extrahieren
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Version in .toc verifizieren
        run: |
          TOC_VERSION=$(grep -oP '^## Version:\s*\K\S+' LunaWolves.toc)
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$TOC_VERSION" != "$EXPECTED" ]; then
            echo "::warning::Tag=$EXPECTED stimmt nicht mit .toc-Version=$TOC_VERSION überein"
          fi

      - name: ZIP mit Addon-Struktur bauen
        run: |
          mkdir -p build/LunaWolves/Modules
          cp Core.lua LunaWolves.toc icon.tga pkgmeta.yaml build/LunaWolves/
          cp Modules/DKP.lua Modules/RaidInvite.lua Modules/Versions.lua build/LunaWolves/Modules/
          cd build
          zip -r ../LunaWolves.zip LunaWolves
          cd ..
          unzip -l LunaWolves.zip

      - name: Release-Notes aus Tag-/Commit-Body bauen
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Bei annotated Tags den Tag-Body nehmen, sonst den Commit-Body.
          TAG_TYPE=$(git cat-file -t "$TAG" 2>/dev/null || echo "commit")
          if [ "$TAG_TYPE" = "tag" ]; then
            NOTES=$(git tag -l --format='%(contents:body)' "$TAG")
            # Falls Tag-Body leer (z.B. nur Signatur), Commit-Body nehmen
            if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
              NOTES=$(git log -1 --format=%b "$TAG")
            fi
          else
            # Lightweight Tag: Commit-Body verwenden
            NOTES=$(git log -1 --format=%b "$TAG")
          fi
          # Wenn Body leer, Fallback auf Subject
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES=$(git log -1 --format=%s "$TAG")
          fi
          # In Datei schreiben (handhabt Mehrzeiler ohne Shell-Escaping)
          printf '%s\n' "$NOTES" > release-notes.md
          echo "--- Release-Notes für $TAG: ---"
          cat release-notes.md
          echo "--- Ende ---"

      - name: Release erstellen oder aktualisieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG existiert bereits – Asset und Notes werden aktualisiert."
            gh release upload "$TAG" LunaWolves.zip --clobber
            gh release edit "$TAG" --notes-file release-notes.md
          else
            echo "Release $TAG wird erstellt."
            gh release create "$TAG" LunaWolves.zip \
              --title "$TAG" \
              --notes-file release-notes.md
          fi
